[build]
  # trigger deploy
  # `npx puppeteer browsers install chrome` guarantees the headless Chrome
  # binary is present before the postbuild prerender step (SEO stopgap) runs.
  command = "npm install --legacy-peer-deps && npx puppeteer browsers install chrome && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
